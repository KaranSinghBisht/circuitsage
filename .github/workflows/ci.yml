name: CircuitSage CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies for WeasyPrint (cairo + pango)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            pkg-config
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend tests
        env:
          # Skip the Ollama-backed embeddings path; vectorstore falls back to a
          # bag-of-words embedder so tests don't need a model server.
          CIRCUITSAGE_EMBED_FALLBACK: bow
        run: PYTHONPATH=backend pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/desktop/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Check locale dictionaries
        run: python3 scripts/i18n_check.py
      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci
      - name: Check desktop companion
        run: npm --prefix apps/desktop run check
      # iOS is verified locally with `npx expo install --check` and `npm --prefix apps/ios run check`.

  dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate dataset
        run: python train/dataset/validate.py
